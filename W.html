<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINGO VIP HACK - Login System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* ==================== GLOBAL STYLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            overflow: hidden;
            background: #000;
            color: #0f0;
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matrix Background */
        #cmatrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: #000;
        }

        /* ==================== LOGIN PAGE ==================== */
        #loginPage {
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            text-align: center;
            padding: 30px 25px;
            min-height: 500px;
            border: 3px solid transparent;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(10, 0, 0, .96), rgba(0, 10, 0, .96));
            position: relative;
            animation: borderGlow 4s infinite ease-in-out;
            z-index: 10;
            box-shadow: 0 0 25px rgba(255, 0, 0, .5), inset 0 0 20px rgba(0, 0, 0, .8);
            overflow: hidden;
        }

        @keyframes borderGlow {
            0% {
                border-color: #ff0000;
                box-shadow: 0 0 20px #ff0000, 0 0 35px rgba(255, 0, 0, .5);
            }
            50% {
                border-color: #00ff00;
                box-shadow: 0 0 20px #00ff00, 0 0 35px rgba(0, 255, 0, .5);
            }
            100% {
                border-color: #ff0000;
                box-shadow: 0 0 20px #ff0000, 0 0 35px rgba(255, 0, 0, .5);
            }
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            width: 120px;
            height: 120px;
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            animation: logoBorder 3s infinite linear;
            z-index: 10;
            position: relative;
            background: rgba(0, 0, 0, 0.9);
            padding: 8px;
            box-shadow: 0 0 30px rgba(255, 0, 0, .6);
        }

        @keyframes logoBorder {
            0% {
                border-color: #ff0000;
                box-shadow: 0 0 20px #ff0000, 0 0 35px rgba(255, 0, 0, .6);
            }
            50% {
                border-color: #00ff00;
                box-shadow: 0 0 20px #00ff00, 0 0 35px rgba(0, 255, 0, .6);
            }
            100% {
                border-color: #ff0000;
                box-shadow: 0 0 20px #ff0000, 0 0 35px rgba(255, 0, 0, .6);
            }
        }

        .title {
            font-size: 24px;
            font-weight: 900;
            margin: 15px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: titleColor 3s infinite linear;
            text-shadow: 0 0 15px currentColor;
        }

        @keyframes titleColor {
            0% { color: #ff0000; }
            50% { color: #00ff00; }
            100% { color: #ff0000; }
        }

        .clock {
            font-size: 20px;
            font-weight: 900;
            margin: 15px 0;
            letter-spacing: 2px;
            animation: clockColor 2s infinite alternate;
            text-shadow: 0 0 12px currentColor;
        }

        @keyframes clockColor {
            0% { color: #ff0000; transform: scale(1); }
            100% { color: #00ff00; transform: scale(1.05); }
        }

        .login-box {
            padding: 20px;
            background: linear-gradient(135deg, rgba(20, 0, 0, .92), rgba(0, 0, 20, .92));
            border-radius: 14px;
            border: 2px solid transparent;
            animation: loginBorder 4s infinite linear;
            box-shadow: 0 0 15px rgba(255, 0, 0, .4);
            margin: 20px 0;
        }

        @keyframes loginBorder {
            0% { border-color: #ff0000; }
            50% { border-color: #00ff00; }
            100% { border-color: #ff0000; }
        }

        .login-box input[type=text] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ff0000;
            border-radius: 8px;
            background: rgba(20, 0, 0, .85);
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            transition: all .4s;
            text-transform: uppercase;
        }

        .login-box input[type=text]::placeholder {
            color: #00ffff;
            font-weight: 700;
            letter-spacing: 1.5px;
            opacity: 1;
        }

        .login-box input[type=text]:focus {
            outline: none;
            box-shadow: 0 0 20px currentColor;
            background: rgba(0, 0, 20, .85);
            color: #ffd700;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin: 15px 0;
            max-width: 100%;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffd700;
            text-shadow: 0 0 5px #ffd700;
            transition: all .3s;
            background: rgba(30, 0, 0, .7);
            padding: 10px 8px;
            border-radius: 8px;
            border: 1px solid #ff0000;
            text-align: center;
            min-height: 45px;
            cursor: pointer;
        }

        .checkbox-item.active {
            background: rgba(0, 30, 0, .9);
            border-color: #00ff00;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, .6);
        }

        .checkbox-item input[type=radio] {
            display: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: linear-gradient(90deg, #ff0000, #00ff00, #ff0000);
            background-size: 300% 100%;
            border: 2px solid #ffd700;
            border-radius: 10px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 215, 0, .6);
            animation: buttonGradient 2s infinite linear;
            transition: all .3s;
        }

        @keyframes buttonGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 1);
        }

        .developer-info {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            border: 1px solid transparent;
            font-size: 14px;
            color: #ffd700;
            letter-spacing: 2px;
            animation: developerGlow 3s infinite alternate;
            font-weight: 900;
            text-transform: uppercase;
        }

        @keyframes developerGlow {
            0% {
                box-shadow: 0 0 5px rgba(255, 0, 0, 0.7);
                border-color: rgba(255, 0, 0, 0.4);
            }
            100% {
                box-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
                border-color: rgba(0, 255, 0, 0.4);
            }
        }

        /* Popups */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a0a00, #000a1a);
            padding: 20px;
            border-radius: 16px;
            border: 3px solid #ff0000;
            color: #ffd700;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            display: none;
            z-index: 1000;
            min-width: 300px;
            max-width: 90%;
            box-shadow: 0 0 35px rgba(255, 0, 0, .8);
            animation: popupAnim 1.5s infinite;
        }

        @keyframes popupAnim {
            0%, 100% { transform: translate(-50%, -50%) scale(1); border-color: #ff0000; }
            50% { border-color: #00ff00; }
        }

        .access-granted {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #0a001a, #001a0a);
            padding: 30px;
            border-radius: 18px;
            border: 3px solid #00ffff;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            display: none;
            z-index: 1000;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 50px rgba(0, 255, 255, 1);
            animation: accessAnim 1.5s infinite;
        }

        @keyframes accessAnim {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* ==================== PREDICTION OVERLAY (WILL SHOW ON DK WIN PAGE) ==================== */
        #prediction-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 320px;
            height: auto;
            z-index: 999999;
            background: rgba(0, 10, 0, 0.95);
            border-radius: 10px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            backdrop-filter: blur(5px);
            transform: translateZ(0);
            user-select: none;
            overflow: hidden;
            display: none;
        }

        .prediction-header {
            background: rgba(0, 30, 0, 0.9);
            padding: 8px 12px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
        }

        .prediction-title {
            font-size: 12px;
            font-weight: 900;
            color: #00ff00;
            text-shadow: 0 0 8px #00ff00;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn {
            background: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            width: 22px;
            height: 22px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(0, 255, 0, 0.2);
        }

        .close-btn {
            border-color: #ff0000;
            color: #ff0000;
        }

        .prediction-content {
            padding: 12px;
        }

        .period-container {
            background: rgba(0, 255, 0, 0.08);
            border: 1px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 10px;
            text-align: center;
        }

        .period-label {
            font-size: 10px;
            color: #00ff00;
            opacity: 0.8;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .period-display {
            font-size: 12px;
            font-weight: 900;
            color: #ff0000 !important;
            text-shadow: 0 0 8px #ff0000 !important;
            margin-bottom: 6px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            border: 2px solid #ff0000;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Share Tech Mono', monospace;
        }

        .timer-container {
            margin-top: 4px;
        }

        .timer-label {
            font-size: 10px;
            color: #00ff00;
            opacity: 0.8;
            margin-bottom: 2px;
        }

        .timer-display {
            font-size: 13px;
            font-weight: 900;
            color: #ff0000 !important;
            text-shadow: 0 0 8px #ff0000 !important;
            transition: all 0.3s;
        }

        .signal-display {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }

        .signal-container, .number-container {
            flex: 1;
            text-align: center;
        }

        .signal-label, .number-label {
            font-size: 10px;
            color: #00ff00;
            opacity: 0.8;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .signal-type {
            font-size: 22px;
            font-weight: 900;
            padding: 6px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px currentColor;
            border: 2px solid;
            box-shadow: 0 0 12px currentColor;
        }

        .signal-type.green {
            color: #00ff00;
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            animation: greenPulse 1.5s infinite alternate;
        }

        .signal-type.red {
            color: #ff0000;
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
            animation: redPulse 1.5s infinite alternate;
        }

        .signal-number {
            font-size: 22px;
            font-weight: 900;
            padding: 6px;
            border-radius: 6px;
            text-shadow: 0 0 8px currentColor;
            border: 2px solid;
            box-shadow: 0 0 12px currentColor;
        }

        .signal-number.green {
            color: #00ff00;
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .signal-number.red {
            color: #ff0000;
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.1);
        }

        @keyframes greenPulse {
            0% { box-shadow: 0 0 12px rgba(0, 255, 0, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.9); }
        }

        @keyframes redPulse {
            0% { box-shadow: 0 0 12px rgba(255, 0, 0, 0.5); }
            100% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.9); }
        }

        .status-container {
            text-align: center;
            margin-top: 8px;
        }

        .status-display {
            display: inline-block;
            font-size: 11px;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: statusPulse 2s infinite;
            width: 100%;
            text-shadow: 0 0 6px currentColor;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }

        .status-generating {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.4);
        }

        .status-win {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid #00ff00;
            color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }

        .status-loss {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff0000;
            color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        .system-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
        }

        .info-item {
            text-align: center;
            padding: 5px;
            background: rgba(0, 255, 0, 0.05);
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 0, 0.15);
        }

        .info-label {
            font-size: 8px;
            color: #00ff00;
            opacity: 0.8;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 9px;
            color: #00ff00;
            font-weight: 900;
            text-shadow: 0 0 4px #00ff00;
        }

        .timer-display.critical {
            font-size: 14px !important;
            color: #ff0000 !important;
            text-shadow: 0 0 15px #ff0000 !important;
            animation: timerCriticalAnimation 0.5s infinite alternate;
        }

        @keyframes timerCriticalAnimation {
            0% { color: #ff0000; }
            100% { color: #ffff00; }
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            display: none;
        }

        .loading-text {
            color: #00ff00;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: loadingPulse 1.5s infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .progress-bar {
            width: 300px;
            height: 10px;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            border-radius: 5px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<!-- Matrix Background -->
<canvas id="cmatrix-canvas"></canvas>

<!-- ==================== LOADING SCREEN ==================== -->

        <div class="progress-fill" id="progressFill"></div>

<!-- ==================== LOGIN PAGE ==================== -->
<div id="loginPage">

<!-- ==================== PREDICTION OVERLAY (HIDDEN INITIALLY) ==================== -->

        <div class="controls">
            <button class="control-btn close-btn" title="Close">✕</button>
        </div>
    </div>
    
    <div class="prediction-content">

            <div class="period-label">Current Period</div>
            <div class="period-display" id="periodDisplay">LOADING...</div>
            
            <div class="timer-container">
                <div class="timer-label">Next Update In</div>
                <div class="timer-display" id="timerDisplay">30s</div>
            </div>
        </div>
        
        <div class="signal-display">
            <div class="signal-container">
                <div class="signal-label">Prediction</div>
                <div class="signal-type" id="signalType">---</div>

            <div class="info-item">
                <div class="info-label">Accuracy</div>
                <div class="info-value" id="accuracyRate">---</div>

            <div class="info-item">
                <div class="info-label">Signal ID</div>
                <div class="info-value">VIP-001</div>
            </div>

<!-- Popups -->

    <div id="errorMessage"></div>
</div>
<div id="accessGranted" class="access-granted">ACCESS GRANTED</div>

<script>
    // ==================== GLOBAL VARIABLES ====================
    let currentUser = null;
    let timer = 30;
    let timerInterval = null;
    let signalInterval = null;
    let isUpdating = false;
    let historyData = [];
    let lastFetchedPeriod = null;
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let isPredictionActive = false;

    // ==================== MATRIX BACKGROUND ====================
    function initMatrix() {
        const canvas = document.getElementById('cmatrix-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        
        const chars = "01";
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        
        const drops = [];
        
        for (let i = 0; i < columns; i++) {
            drops[i] = {
                y: Math.floor(Math.random() * -1000),
                speed: 0.5 + Math.random() * 1.5
            };
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = `${fontSize}px 'Share Tech Mono', monospace`;
            ctx.fillStyle = '#0f0';
            
            for (let i = 0; i < columns; i++) {
                const x = i * fontSize;
                ctx.fillText(chars[Math.floor(Math.random() * chars.length)], x, drops[i].y);
                drops[i].y += drops[i].speed;
                
                if (drops[i].y > canvas.height) {
                    drops[i].y = -20;
                }
            }
        }
        
        function animate() {
            draw();
            requestAnimationFrame(animate);
        }
        
        animate();
        window.addEventListener('resize', resizeCanvas);
    }

    // ==================== CLOCK FUNCTION ====================
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
    }

    // ==================== PASSWORD SYSTEM ====================
    const passwords = [
        { code: "RXWINGO", duration: 24 * 60 * 60 * 1000 },
        { code: "RXWINR2", duration: 24 * 60 * 60 * 1000 },
        { code: "RXWINV3", duration: 24 * 60 * 60 * 1000 },
        { code: "RXWINL4", duration: 24 * 60 * 60 * 1000 }
    ];

    // ==================== POPUP FUNCTIONS ====================
    function showError(msg) {
        document.getElementById('errorMessage').innerHTML = msg;
        document.getElementById('errorPopup').style.display = 'block';
        setTimeout(() => {
            document.getElementById('errorPopup').style.display = 'none';
        }, 3000);
    }

    // ==================== LOGIN FUNCTION ====================
    async function handleLogin() {
        const code = document.getElementById('activationCode').value.trim().toUpperCase();
        
        if (!code) {
            return showError('Please enter password!');
        }

        if (code.length !== 7) {
            return showError('Password must be 7 characters!');
        }

        let key = passwords.find(k => k.code === code);

        if (!key) {
            return showError('Invalid password!');
        }

        // Show access granted
        document.getElementById('accessGranted').style.display = 'block';
        
        // Start loading and redirect
        setTimeout(() => {
            document.getElementById('accessGranted').style.display = 'none';
            
            // Show loading screen
            document.getElementById('loadingScreen').style.display = 'flex';
            document.getElementById('loginPage').style.display = 'none';
            
            // Simulate loading progress
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += 10;
                document.getElementById('progressFill').style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(progressInterval);
                    
                    // REDIRECT TO DK WIN WINGO 30S PAGE
                    window.location.href = "https://dkwin9.com/#/saasLottery/WinGo?gameCode=WinGo_30S&lottery=WinGo";
                }
            }, 200);
            
        }, 2000);
    }

    // ==================== PREDICTION SYSTEM ====================
    function initPredictionSystem() {
        console.log('Initializing prediction system on DK Win page...');
        
        // Show prediction overlay
        document.getElementById('prediction-overlay').style.display = 'block';
        isPredictionActive = true;
        
        // Initialize drag and drop
        initDragDrop();
        
        // Initialize controls
        initControls();
        
        // Start the prediction system
        updatePrediction();
        startTimer();
        
        // Update every 30 seconds
        signalInterval = setInterval(updatePrediction, 30000);
        
        console.log('Prediction system activated!');
    }

    // ==================== DRAG & DROP ====================
    function initDragDrop() {
        const overlay = document.getElementById('prediction-overlay');
        const dragHandle = document.getElementById('dragHandle');
        
        dragHandle.addEventListener('mousedown', startDrag);
        
        function startDrag(e) {
            e.preventDefault();
            isDragging = true;
            const rect = overlay.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }
        
        function onDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            overlay.style.left = (e.clientX - dragOffsetX) + 'px';
            overlay.style.top = (e.clientY - dragOffsetY) + 'px';
            overlay.style.right = 'auto';
        }
        
        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }
    }

    // ==================== CONTROLS ====================
    function initControls() {
        const closeBtn = document.querySelector('.close-btn');
        
        closeBtn.addEventListener('click', () => {
            if (confirm('Close prediction overlay? It will stop working.')) {
                document.getElementById('prediction-overlay').style.display = 'none';
                clearInterval(timerInterval);
                clearInterval(signalInterval);
                isPredictionActive = false;
            }
        });
    }

    // ==================== WINGO 30S API ====================
    async function fetchWingo30SData() {
        try {
            const timestamp = Date.now();
            const proxyUrl = "https://corsproxy.io/?";
            const apiUrl = `https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=${timestamp}`;
            
            const response = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                method: 'GET',
                headers: {
                    'Accept': 'application/json',
                    'Cache-Control': 'no-cache'
                }
            });
            
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            
            const data = await response.json();
            
            if (data?.data?.list?.length > 0) {
                const latest = data.data.list[0];
                return {
                    period: latest.issueNumber,
                    number: parseInt(latest.number),
                    openTime: latest.openTime
                };
            }
            
            return null;
        } catch (error) {
            console.error('API Error:', error);
            return generateFallbackData();
        }
    }

    function generateFallbackData() {
        const now = new Date();
        const year = now.getFullYear();
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        const hour = now.getHours().toString().padStart(2, '0');
        const minute = now.getMinutes().toString().padStart(2, '0');
        const second = now.getSeconds().toString().padStart(2, '0');
        
        return {
            period: `${year}${month}${day}${hour}${minute}${second}01`,
            number: Math.floor(Math.random() * 10),
            openTime: now.toISOString()
        };
    }

    function incrementPeriodByOne(period) {
        if (!period || period.length !== 14) {
            const now = new Date();
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const hour = now.getHours().toString().padStart(2, '0');
            const minute = now.getMinutes().toString().padStart(2, '0');
            const second = now.getSeconds().toString().padStart(2, '0');
            return `${year}${month}${day}${hour}${minute}${second}01`;
        }
        
        try {
            const sequenceStr = period.substring(12, 14);
            let sequenceNum = parseInt(sequenceStr);
            sequenceNum += 1;
            const nextSequence = sequenceNum.toString().padStart(2, '0');
            const basePart = period.substring(0, 12);
            return basePart + nextSequence;
        } catch (error) {
            console.error('Error incrementing period:', error);
            return period;
        }
    }

    function generatePrediction() {
        if (historyData.length < 3) {
            const num = Math.floor(Math.random() * 10);
            return { prediction: num >= 5 ? "BIG" : "SMALL", number: num };
        }

        let recent = historyData.slice(0, 3).filter(h => h.result !== "-");
        let bigCount = 0, smallCount = 0;

        for (let r of recent) {
            if (r.result >= 5) bigCount++;
            else smallCount++;
        }

        let prediction, number;
        if (bigCount > smallCount) {
            prediction = "BIG";
            number = Math.floor(Math.random() * 5) + 5;
        } else if (smallCount > bigCount) {
            prediction = "SMALL";
            number = Math.floor(Math.random() * 5);
        } else {
            number = Math.floor(Math.random() * 10);
            prediction = number >= 5 ? "BIG" : "SMALL";
        }
        
        return { prediction, number };
    }

    // ==================== UPDATE PREDICTION ====================
    async function updatePrediction() {
        if (isUpdating || !isPredictionActive) return;
        isUpdating = true;
        
        try {
            const wingoData = await fetchWingo30SData();
            let currentPeriod = wingoData?.period;
            let winningNumber = wingoData?.number;
            
            if (!currentPeriod) {
                const fallback = generateFallbackData();
                currentPeriod = fallback.period;
                winningNumber = fallback.number;
            }
            
            const nextPeriod = incrementPeriodByOne(currentPeriod);
            
            if (currentPeriod !== lastFetchedPeriod) {
                lastFetchedPeriod = currentPeriod;
                
                document.getElementById('periodDisplay').textContent = nextPeriod;
                
                // Update previous result
                if (historyData.length > 0 && historyData[0].result === "-") {
                    const lastPred = historyData[0];
                    const actualOutcome = winningNumber >= 5 ? 'BIG' : 'SMALL';
                    
                    if (lastPred.prediction === actualOutcome) {
                        document.getElementById('statusDisplay').textContent = "PREVIOUS WIN ✓";
                        document.getElementById('statusDisplay').className = "status-display status-win";
                    } else {
                        document.getElementById('statusDisplay').textContent = "PREVIOUS WIN ✗";
                        document.getElementById('statusDisplay').className = "status-display status-loss";
                    }
                    
                    historyData[0].result = winningNumber;
                }
                
                // Generate new prediction
                const prediction = generatePrediction();
                const signalTypeElement = document.getElementById('signalType');
                const signalNumberElement = document.getElementById('signalNumber');
                
                signalTypeElement.textContent = prediction.prediction;
                signalTypeElement.className = prediction.prediction === "BIG" ? "signal-type green" : "signal-type red";
                
                signalNumberElement.textContent = prediction.number;
                signalNumberElement.className = prediction.number >= 5 ? "signal-number green" : "signal-number red";
                
                // Update history
                historyData.unshift({
                    period: nextPeriod,
                    prediction: prediction.prediction,
                    predictedNumber: prediction.number,
                    result: "-"
                });
                
                if (historyData.length > 5) historyData.pop();
                
                // Update accuracy
                if (historyData.length >= 3) {
                    const total = historyData.filter(h => h.result !== "-").length;
                    const correct = historyData.filter(h => h.result !== "-" && 
                        (h.prediction === "BIG" ? h.result >= 5 : h.result < 5)).length;
                    
                    const accuracy = total > 0 ? Math.round((correct / total) * 100) : 88;
                    document.getElementById('accuracyRate').textContent = `${accuracy}%`;
                } else {
                    const accuracy = 88 + Math.floor(Math.random() * 10);
                    document.getElementById('accuracyRate').textContent = `${accuracy}%`;
                }
                
                document.getElementById('statusDisplay').textContent = "GENERATING SIGNAL";
                document.getElementById('statusDisplay').className = "status-display status-generating";
            }
            
        } catch (error) {
            console.error('Update Error:', error);
        } finally {
            isUpdating = false;
        }
    }

    // ==================== TIMER ====================
    function startTimer() {
        clearInterval(timerInterval);
        
        const now = new Date();
        const currentSeconds = now.getSeconds();
        timer = 30 - (currentSeconds % 30);
        
        const timerDisplay = document.getElementById('timerDisplay');
        timerDisplay.textContent = `${timer}s`;
        
        timerInterval = setInterval(() => {
            timer--;
            
            if (timer <= 0) {
                updatePrediction();
                timer = 30;
            }
            
            timerDisplay.textContent = `${timer}s`;
            
            // Last 5 seconds effect
            if (timer <= 5 && timer > 0) {
                timerDisplay.className = "timer-display critical";
            } else {
                timerDisplay.className = "timer-display";
            }
        }, 1000);
    }

    // ==================== CHECK DK WIN PAGE ====================
    function checkIfOnDKWinWingoPage() {
        const currentUrl = window.location.href;
        const isDKWinPage = currentUrl.includes('dkwin9.com') && 
                           currentUrl.includes('saasLottery/WinGo');
        
        if (isDKWinPage && !isPredictionActive) {
            // User is on DK Win WINGO page, activate prediction system
            setTimeout(initPredictionSystem, 2000); // Wait 2 seconds for page to load
            return true;
        }
        return false;
    }

    // ==================== INITIALIZATION ====================
    window.onload = function() {
        // Initialize matrix background
        initMatrix();
        
        // Start clock
        updateClock();
        setInterval(updateClock, 1000);
        
        // Setup login button
        document.getElementById('loginBtn').addEventListener('click', handleLogin);
        
        // Enter key for login
        document.getElementById('activationCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
        
        // Check if we're already on DK Win page (user might have refreshed)
        if (checkIfOnDKWinWingoPage()) {
            // Hide login page, show prediction
            document.getElementById('loginPage').style.display = 'none';
        }
        
        // Check URL every second
        setInterval(checkIfOnDKWinWingoPage, 1000);
    };
</script>
